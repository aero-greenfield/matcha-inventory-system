{% extends "base.html" %}

{% block title %}Add Recipe{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1>Add Recipe</h1>
        <p class="page-subtitle">Create a new product recipe with its required materials</p>
    </div>
</div>

<div class="form-card" style="max-width:780px;">
    <form method="POST" id="recipe-form">
        <div class="form-row">
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" name="product_name" required placeholder="e.g., Matcha Latte">
            </div>
            <div class="form-group">
                <label>Notes (Optional)</label>
                <input type="text" name="notes" placeholder="e.g., Sweetened, Vegan, etc.">
            </div>
        </div>

        <p style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin:20px 0 12px;">Materials Required</p>
        <div id="materials-container">
            <div class="material-row" id="material-row-0">
                <div class="form-group">
                    <label>Material Name *</label>
                    <input type="text" name="material_name_0" required placeholder="e.g., Matcha Powder">
                </div>
                <div class="form-group">
                    <label>Quantity Needed *</label>
                    <input type="number" step="0.01" name="quantity_0" required placeholder="e.g., 10">
                </div>
                <button type="button" class="btn btn-danger" onclick="removeMaterial(0)" style="align-self:flex-end;padding:9px 12px;">&#x2715;</button>
            </div>
        </div>

        <button type="button" class="btn btn-secondary" onclick="addMaterial()" style="margin-bottom:20px;">+ Add Material</button>
        <br>
        <button type="submit" class="btn btn-primary">Create Recipe</button>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    </form>
</div>

<script src="{{ url_for('static', filename='js/autocomplete.js') }}"></script>
<script>
let materialCount = 1;

function addMaterial() {
    const container = document.getElementById('materials-container');
    const newRow = document.createElement('div');
    newRow.className = 'material-row';
    newRow.id = 'material-row-' + materialCount;
    newRow.innerHTML = `
        <div class="form-group">
            <label>Material Name</label>
            <input type="text" name="material_name_${materialCount}" placeholder="e.g., Milk">
        </div>
        <div class="form-group">
            <label>Quantity Needed</label>
            <input type="number" step="0.01" name="quantity_${materialCount}" placeholder="e.g., 200">
        </div>
        <button type="button" class="btn btn-danger" onclick="removeMaterial(${materialCount})" style="align-self:flex-end;padding:9px 12px;">&#x2715;</button>
    `;
    container.appendChild(newRow);
    attachAutocomplete(newRow.querySelector(`[name="material_name_${materialCount}"]`), fetchMaterials);
    materialCount++;
}

function removeMaterial(index) {
    const rows = document.querySelectorAll('.material-row');
    if (rows.length <= 1) {
        alert('A recipe must have at least one material.');
        return;
    }
    const row = document.getElementById('material-row-' + index);
    if (row) row.remove();
}

document.addEventListener('DOMContentLoaded', () => {
    attachAutocomplete(document.querySelector('[name="material_name_0"]'), fetchMaterials);
});
</script>

{% endblock %}
