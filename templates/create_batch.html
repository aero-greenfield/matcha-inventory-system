{% extends "base.html" %}

{% block title %}Create Batch{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1>New Batch</h1>
        <p class="page-subtitle">Create a new production batch</p>
    </div>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group"><label>Product Name *</label><input type="text" name="product_name" required></div>
            <div class="form-group"><label>Quantity *</label><input type="number" step="0.01" name="quantity" required></div>
        </div>
        <div class="form-group"><label>Notes (Optional)</label><input type="text" name="notes"></div>
        <div class="form-group"><label>Batch ID (Optional)</label><input type="number" name="batch_id" min="1"></div>
        <div class="form-group" style="max-width:300px;">
            <label for="expiration_date">Expiration Date <span style="color:#888">(optional)</span></label>
            <input type="date" id="expiration_date" name="expiration_date" value="">
        </div>
        <div class="form-group" style="max-width:300px;">
            <label for="planned_completion_date">Planned Completion Date <span style="color:#888">(optional — creates a Planned batch)</span></label>
            <input type="date" id="planned_completion_date" name="planned_completion_date" value="">
            <small style="color:var(--text-muted);display:block;margin-top:4px;">If set, the batch will be created with Planned status and transition to Ready automatically on this date.</small>
        </div>
        <button type="submit" class="btn btn-primary">Create Batch</button>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    </form>
</div>

<script src="{{ url_for('static', filename='js/autocomplete.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    attachAutocomplete(document.querySelector('[name="product_name"]'), fetchRecipes);
});
</script>

{% endblock %}
